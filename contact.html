<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>Join Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header>
        <h1>Become a Member</h1>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="data.html">Schedule</a></li>

            <li><a href="portfolio.html">Portfolio</a></li>
            <li><a href="contact.html" id="diffbutton">Join Us</a></li>
        </ul>
    </nav>

    <main id="main-content">
        <section>
            <h2>Registration Form</h2>
            <form>
                <fieldset>
                    <legend>Personal Information</legend>
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" required>
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" required>
                </fieldset>

                <fieldset>
                    <legend>Session Details</legend>
                    
                    <label for="subject">Interested subject:</label>
                    <select id="subject">
                    <option>Web Design</option>
                    <option>C++ Programming</option>
                    <option>Databases</option>
                    <option>Mathematics</option>
                    </select>
                    
                    <label for="message">Your message:</label>
                    <textarea id="message" rows="4"></textarea>

                   <button type="submit">Submit request</button>
                </fieldset>
            </form>
        </section>
    
    <img src="studiat.webp" alt="Students learning" class="banner">
    </main>

    <footer>
        <p>&copy; 2026 UVT Study Group Hub </p>
    </footer>
</body>
</html>
